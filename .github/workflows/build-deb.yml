name: Build & Release Edbian Apps Updater .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential devscripts debhelper dpkg-dev fakeroot

    - name: Determine version
      run: |
        VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^v//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Update debian/control version
      run: |
        sed -i "s/^Version:.*/Version: $VERSION/" debian/control
        cat debian/control

    - name: Build .deb
      run: |
        dpkg-buildpackage -us -uc -b

    - name: Locate .deb file
      run: |
        DEB_FILE=$(ls ../*.deb | head -n 1)
        echo "DEB_FILE=$DEB_FILE" >> $GITHUB_ENV
        echo "Found package: $DEB_FILE"

    - name: Rename .deb (opcional)
      run: |
        cp "$DEB_FILE" "edbian-apps-updater-${VERSION}.deb"

    - name: Debug files
      run: ls -lah

    - name: Create Release & Upload Asset
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}
        name: v${{ env.VERSION }}
        files: edbian-apps-updater-${{ env.VERSION }}.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact (Actions)
      uses: actions/upload-artifact@v4
      with:
        name: edbian-apps-updater-deb
        path: edbian-apps-updater-${{ env.VERSION }}.deb
